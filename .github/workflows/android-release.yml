name: Android Auto Release to GitHub

# 触发条件：推送以 v 开头的 tag（如 v1.0.0）
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须，否则无法创建 Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      # 1. 还原 keystore 文件
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release-key.jks

      # 2. 构建签名 Release APK + AAB
      - name: Build signed APK & AAB
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=app/release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      # 3. 自动创建 GitHub Release 并上传 APK/AAB
      - name: Create GitHub Release & Upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            自动构建版本 ${{ github.ref_name }}
            - 包含签名 APK
            - 包含 AAB 包
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}