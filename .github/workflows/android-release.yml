name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # 安装 Android Build Tools 29.0.3（解决 zipalign 找不到）
      - name: Install Android Build Tools 29.0.3
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;29.0.3"

      - uses: gradle/gradle-build-action@v3
        with:
          gradle-version: current
          arguments: assembleRelease

      # 签名 APK
      - uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 重命名
      - run: mv ${{steps.sign_app.outputs.signedReleaseFile}} Quizplayer_${GITHUB_REF_NAME}.apk

      # 创建发布
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "*.apk"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true